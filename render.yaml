services:
  - type: web
    name: smartorder-api
    runtime: node
    rootDir: artifacts/api-server
    buildCommand: npm install -g pnpm && pnpm install --no-frozen-lockfile && pnpm run build
    startCommand: node --enable-source-maps ./dist/index.mjs
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
