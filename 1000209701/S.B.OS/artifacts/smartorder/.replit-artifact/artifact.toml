kind = "web"
previewPath = "/"
title = "SmartOrder AI"
version = "1.0.0"
id = "artifacts/smartorder"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24658

[services.development]
run = "pnpm --filter @workspace/smartorder run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smartorder", "run", "build" ]
publicDir = "artifacts/smartorder/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24658"
BASE_PATH = "/"
